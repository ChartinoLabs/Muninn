---
name: Muninn main branch push or PR
on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
      - name: Format with ruff
        run: uv run ruff format --check .
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
      - name: Lint with ruff
        run: uv run ruff check .
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
      - name: Security scan with bandit
        run: uv run bandit -r src/
  check-complexity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
      - name: Check code complexity with xenon
        run: uv run xenon --max-absolute B --max-modules B --max-average A src/
  check-types:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check type hints with ty
        run: uv run ty check .
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests with pytest
        run: uv run pytest --cov=src --cov-report=term-missing
